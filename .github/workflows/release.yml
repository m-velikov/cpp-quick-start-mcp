name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry Run (build and simulate publish without making actual changes)"
        required: true
        type: boolean
        default: false
      publish_npm:
        description: "Publish to NPM Registry"
        required: true
        type: boolean
        default: true
      publish_github:
        description: "Create GitHub Release (with source and binary tarball)"
        required: true
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Get version from package.json
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Set NODE_AUTH_TOKEN to empty string
        run: echo "NODE_AUTH_TOKEN=" >> $GITHUB_ENV

      - name: Publish to NPM (Dry Run)
        if: ${{ inputs.dry_run && inputs.publish_npm }}
        run: npm publish --dry-run --provenance

      - name: Publish to NPM
        if: ${{ !inputs.dry_run && inputs.publish_npm }}
        run: npm publish --provenance

      - name: Pack package for GitHub Release
        if: ${{ inputs.publish_github }}
        run: npm pack

      - name: Create GitHub Release (Dry Run)
        if: ${{ inputs.dry_run && inputs.publish_github }}
        run: |
          echo "Dry run: Would have created a GitHub Release for v${{ env.VERSION }} with attached binary tarball"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run && inputs.publish_github }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          generate_release_notes: true
          files: |
            m-velikov-cpp-quick-start-mcp-${{ env.VERSION }}.tgz
